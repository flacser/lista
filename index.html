<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Precios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000;
    --fg:#ffffff;
    --muted:#8a8a8a;
    --surface:#0d0d0d;
    --surface-2:#141414;
    --border:#1f1f1f;
    --border-strong:#3a3a3a;
    --ease-spring: cubic-bezier(.34,1.56,.64,1);
  }

  *{ box-sizing:border-box; }

  html, body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    background:var(--bg);
    color:var(--fg);
  }

  body{
    font-family:'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
    min-height:100vh;
    min-height:100dvh;
    animation:pageFade .45s ease;
  }

  @keyframes pageFade{ from{ opacity:0; } to{ opacity:1; } }

  button, input, select{ font-family:inherit; }

  :focus{ outline:none; }
  :focus-visible{ outline:2px solid var(--fg); outline-offset:2px; border-radius:4px; }

  /* ---------- Header / búsqueda ---------- */

  #searchHeader{
    position:fixed;
    top:0; left:0; right:0;
    z-index:30;
    display:flex;
    justify-content:center;
    padding:calc(22px + env(safe-area-inset-top)) 20px 14px;
    background:var(--bg);
  }

  #searchWrap{
    position:relative;
    width:100%;
    max-width:560px;
  }

  #searchInput{
    width:100%;
    text-align:center;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--fg);
    font-size:1.05rem;
    padding:17px 22px;
    border-radius:999px;
    transition:border-color .2s ease, box-shadow .2s ease, background .2s ease, padding-right .15s ease;
  }

  #searchInput.hasClear{ padding-right:52px; }
  #searchInput::placeholder{ color:var(--muted); text-align:center; }
  #searchInput:focus{ border-color:var(--border-strong); box-shadow:0 0 0 5px rgba(255,255,255,0.05); }

  #clearSearchBtn{
    position:absolute;
    top:50%;
    right:8px;
    width:34px;
    height:34px;
    border-radius:50%;
    border:none;
    background:#1c1c1c;
    color:var(--fg);
    font-size:1.25rem;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transform:translateY(-50%) scale(.6);
    transition:opacity .15s ease, transform .2s var(--ease-spring), background .15s ease;
  }

  #clearSearchBtn.show{ opacity:1; pointer-events:auto; transform:translateY(-50%) scale(1); }
  #clearSearchBtn:hover{ background:#2a2a2a; }
  #clearSearchBtn:active{ transform:translateY(-50%) scale(.85); }

  /* ---------- Contenido / resultados ---------- */

  #app{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:100px 20px 150px;
  }

  #results{
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  @keyframes itemIn{
    from{ opacity:0; transform:translateY(10px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .resultItem{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    transition:border-color .15s ease;
    animation:itemIn .35s var(--ease-spring) both;
  }

  .resultItem:hover, .resultItem.expanded{ border-color:var(--border-strong); }

  .resultRow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    padding:15px 18px;
    cursor:pointer;
    transition:background .15s ease;
  }

  .resultRow:hover{ background:#111111; }
  .resultRow:active{ background:#161616; }

  .resultInfo{
    display:flex;
    flex-direction:column;
    gap:3px;
    min-width:0;
  }

  .resultName{
    font-weight:600;
    font-size:1rem;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .resultMeta{
    font-size:0.78rem;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .resultPrice{
    font-weight:700;
    font-size:1.4rem;
    white-space:nowrap;
    flex-shrink:0;
    display:flex;
    align-items:baseline;
  }

  .currency{
    font-weight:500;
    font-size:0.5em;
    opacity:0.65;
    margin-right:3px;
  }

  .editReveal{
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition:max-height .25s ease, opacity .2s ease;
  }

  .resultItem.expanded .editReveal{ max-height:64px; opacity:1; }

  .editBtn{
    display:block;
    width:100%;
    padding:13px 0;
    border:none;
    border-top:1px solid var(--border);
    background:transparent;
    color:var(--fg);
    font-size:0.92rem;
    font-weight:600;
    cursor:pointer;
    transition:background .15s ease;
  }

  .editBtn:hover{ background:#161616; }
  .editBtn:active{ background:#1c1c1c; }

  .empty{
    color:var(--muted);
    text-align:center;
    margin-top:18px;
    font-size:0.92rem;
    animation:itemIn .35s ease both;
  }

  /* ---------- Botón + ---------- */

  #addBtn{
    position:fixed;
    bottom:calc(30px + env(safe-area-inset-bottom));
    left:50%;
    width:66px;
    height:66px;
    border-radius:50%;
    background:var(--fg);
    color:var(--bg);
    border:none;
    font-size:2rem;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 20px rgba(255,255,255,0.16);
    transition:transform .3s var(--ease-spring), opacity .2s ease, box-shadow .2s ease;
    transform:translateX(-50%) scale(1);
    z-index:20;
  }

  #addBtn span{ margin-top:-3px; }
  #addBtn:hover{ transform:translateX(-50%) scale(1.07); box-shadow:0 8px 24px rgba(255,255,255,0.24); }
  #addBtn:active{ transform:translateX(-50%) scale(0.92); }

  #addBtn.hidden{
    opacity:0;
    transform:translateX(-50%) translateY(24px) scale(.7);
    pointer-events:none;
  }

  /* ---------- Modal: producto ---------- */

  #modalOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity .2s ease, visibility .2s ease;
  }

  #modalOverlay.open{ opacity:1; visibility:visible; pointer-events:auto; }

  #modal{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:26px;
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    gap:16px;
    transform:scale(.92) translateY(12px);
    opacity:0;
    transition:transform .3s var(--ease-spring), opacity .2s ease;
  }

  #modalOverlay.open #modal{ transform:scale(1) translateY(0); opacity:1; }

  .field{
    display:flex;
    flex-direction:column;
    gap:7px;
    width:100%;
  }

  .field label{
    font-size:0.78rem;
    color:var(--muted);
    padding-left:3px;
    letter-spacing:.01em;
  }

  #modal input{
    background:#000000;
    border:1px solid var(--border);
    color:var(--fg);
    padding:13px 16px;
    border-radius:10px;
    font-size:0.95rem;
    width:100%;
    transition:border-color .15s ease;
  }

  #modal input::placeholder{ color:#555555; }
  #modal input:focus{ border-color:var(--border-strong); }

  /* ---------- Categoría: buscador / autocompletar ---------- */

  .customSelect{ position:relative; width:100%; }

  .customSelectList{
    position:absolute;
    top:calc(100% + 8px);
    left:0; right:0;
    background:var(--surface-2);
    border:1px solid var(--border-strong);
    border-radius:12px;
    padding:6px;
    max-height:230px;
    overflow-y:auto;
    z-index:5;
    box-shadow:0 14px 34px rgba(0,0,0,0.55);
    opacity:0;
    visibility:hidden;
    transform:translateY(-6px) scale(.98);
    transform-origin:top center;
    transition:opacity .15s ease, transform .18s var(--ease-spring), visibility .15s ease;
  }

  .customSelectList.open{ opacity:1; visibility:visible; transform:translateY(0) scale(1); }

  .customSelectOption{
    padding:11px 13px;
    border-radius:8px;
    font-size:0.92rem;
    cursor:pointer;
    transition:background .12s ease;
  }

  .customSelectOption:hover, .customSelectOption.highlighted{ background:#222222; }

  .modalActions{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:6px;
  }

  .modalActions button{
    flex:1;
    max-width:170px;
    padding:15px 0;
    border-radius:13px;
    cursor:pointer;
    font-size:0.96rem;
    font-weight:600;
    border:1px solid var(--border);
    background:transparent;
    color:var(--fg);
    transition:background .15s ease, border-color .15s ease, transform .15s ease;
  }

  .modalActions button:hover{ background:#1a1a1a; border-color:var(--border-strong); }
  .modalActions button:active{ transform:scale(.97); }

  #saveBtn, #confirmDeleteBtn{
    background:var(--fg);
    color:var(--bg);
    border:none;
  }

  #saveBtn:hover, #confirmDeleteBtn:hover{ background:#e2e2e2; }

  #deleteBtn{
    align-self:center;
    background:none;
    border:none;
    color:var(--muted);
    text-decoration:underline;
    font-size:0.85rem;
    padding:2px 0;
    cursor:pointer;
    transition:color .15s ease;
  }

  #deleteBtn:hover{ color:var(--fg); background:none; }

  /* ---------- Modal: confirmar borrado ---------- */

  #confirmOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.78);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:60;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity .2s ease, visibility .2s ease;
  }

  #confirmOverlay.open{ opacity:1; visibility:visible; pointer-events:auto; }

  #confirmModal{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:26px;
    width:100%;
    max-width:340px;
    display:flex;
    flex-direction:column;
    gap:18px;
    text-align:center;
    transform:scale(.9) translateY(10px);
    opacity:0;
    transition:transform .3s var(--ease-spring), opacity .2s ease;
  }

  #confirmOverlay.open #confirmModal{ transform:scale(1) translateY(0); opacity:1; }

  #confirmText{
    margin:0;
    font-size:1rem;
    line-height:1.45;
    word-break:break-word;
  }

  /* ---------- Indicador de sync Firestore ---------- */

  #syncDot{
    position:fixed;
    top:calc(16px + env(safe-area-inset-top));
    right:18px;
    width:7px;
    height:7px;
    border-radius:50%;
    background:var(--border-strong);
    z-index:40;
    transition:background .4s ease, box-shadow .4s ease;
  }

  #syncDot.connecting{
    background:#f5a623;
    box-shadow:0 0 0 0 rgba(245,166,35,.6);
    animation:syncPulse 1.2s infinite;
  }

  #syncDot.synced{
    background:#4cd964;
    box-shadow:none;
  }

  #syncDot.error{
    background:#ff3b30;
    box-shadow:none;
  }

  @keyframes syncPulse{
    0%{ box-shadow:0 0 0 0 rgba(245,166,35,.6); }
    70%{ box-shadow:0 0 0 6px rgba(245,166,35,0); }
    100%{ box-shadow:0 0 0 0 rgba(245,166,35,0); }
  }

  /* ---------- Toast de error/aviso ---------- */

  #toastContainer{
    position:fixed;
    bottom:calc(110px + env(safe-area-inset-bottom));
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:8px;
    z-index:80;
    pointer-events:none;
  }

  .toast{
    background:#1a1a1a;
    border:1px solid var(--border-strong);
    color:var(--fg);
    padding:12px 18px;
    border-radius:12px;
    font-size:0.86rem;
    max-width:88vw;
    text-align:center;
    pointer-events:auto;
    animation:toastIn .3s var(--ease-spring) both;
    box-shadow:0 6px 18px rgba(0,0,0,0.5);
  }

  .toast.error{ border-color:#ff3b30; color:#ff6b63; }

  @keyframes toastIn{
    from{ opacity:0; transform:translateY(12px) scale(.95); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  @keyframes toastOut{
    from{ opacity:1; transform:scale(1); }
    to{ opacity:0; transform:scale(.9); }
  }

  #celebrateOverlay{
    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:16px;
    pointer-events:none;
    z-index:90;
    opacity:0;
  }

  #celebrateOverlay.show{ animation:celebrateFade 1.4s ease forwards; }

  @keyframes celebrateFade{
    0%{ opacity:0; }
    10%{ opacity:1; }
    78%{ opacity:1; }
    100%{ opacity:0; }
  }

  #celebrateBadge{
    position:relative;
    width:86px;
    height:86px;
    border-radius:50%;
    background:var(--fg);
    display:flex;
    align-items:center;
    justify-content:center;
    transform:scale(0);
  }

  #celebrateOverlay.show #celebrateBadge{
    animation:badgePop .6s var(--ease-spring) forwards;
  }

  @keyframes badgePop{
    0%{ transform:scale(0) rotate(-20deg); }
    55%{ transform:scale(1.18) rotate(6deg); }
    100%{ transform:scale(1) rotate(0deg); }
  }

  .checkIcon{
    width:42px;
    height:42px;
    stroke:var(--bg);
    fill:none;
    stroke-width:3;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:30;
    stroke-dashoffset:30;
  }

  #celebrateOverlay.show .checkIcon{
    animation:drawCheck .4s ease forwards .22s;
  }

  @keyframes drawCheck{ to{ stroke-dashoffset:0; } }

  .ray{
    position:absolute;
    top:50%;
    left:50%;
    width:5px;
    height:5px;
    border-radius:50%;
    background:var(--fg);
    transform:translate(-50%,-50%) rotate(var(--angle)) translateY(0) scale(0);
    opacity:0;
  }

  #celebrateOverlay.show .ray{
    animation:rayBurst .65s ease forwards .08s;
  }

  @keyframes rayBurst{
    0%{ transform:translate(-50%,-50%) rotate(var(--angle)) translateY(0) scale(0); opacity:0; }
    35%{ opacity:1; transform:translate(-50%,-50%) rotate(var(--angle)) translateY(-52px) scale(1.5); }
    100%{ opacity:0; transform:translate(-50%,-50%) rotate(var(--angle)) translateY(-70px) scale(.4); }
  }

  #celebrateLabel{
    color:var(--fg);
    font-weight:600;
    font-size:1.05rem;
    text-align:center;
    max-width:80vw;
    opacity:0;
    transform:translateY(6px);
  }

  #celebrateOverlay.show #celebrateLabel{
    animation:labelIn .4s ease forwards .35s;
  }

  @keyframes labelIn{ to{ opacity:1; transform:translateY(0); } }

  @media (max-width:480px){
    #searchHeader{ padding:calc(18px + env(safe-area-inset-top)) 16px 12px; }
    #app{ padding:90px 16px 140px; }
    #addBtn{ width:60px; height:60px; font-size:1.8rem; }
    #modal{ padding:22px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }
</style>
</head>
<body>

<header id="searchHeader">
  <div id="searchWrap">
    <input id="searchInput" type="text" placeholder="Buscar" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button id="clearSearchBtn" type="button" aria-label="Borrar búsqueda">&times;</button>
  </div>
</header>

<main id="app">
  <div id="results"></div>
</main>

<button id="addBtn" aria-label="Agregar producto" aria-haspopup="dialog"><span>+</span></button>

<div id="syncDot" title="Estado de sincronización"></div>
<div id="toastContainer"></div>

<div id="modalOverlay" role="dialog" aria-modal="true" aria-label="Producto">
  <div id="modal">
    <div class="field">
      <label for="fieldName">Nombre</label>
      <input id="fieldName" type="text" autocomplete="off" enterkeyhint="next">
    </div>

    <div class="field">
      <label for="fieldCategory">Categoría</label>
      <div class="customSelect" id="categorySelect">
        <input id="fieldCategory" type="text" autocomplete="off" placeholder="Buscar o escribir categoría" enterkeyhint="next">
        <div class="customSelectList" id="categoryOptionsList" role="listbox"></div>
      </div>
    </div>

    <div class="field">
      <label for="fieldKeywords">Palabras clave</label>
      <input id="fieldKeywords" type="text" autocomplete="off" placeholder="separadas por comas" enterkeyhint="next">
    </div>

    <div class="field">
      <label for="fieldPrice">Precio</label>
      <input id="fieldPrice" type="number" step="0.01" min="0" inputmode="decimal" autocomplete="off" enterkeyhint="done">
    </div>

    <div class="modalActions">
      <button id="cancelBtn" type="button">Cancelar</button>
      <button id="saveBtn" type="button">Guardar</button>
    </div>

    <button id="deleteBtn" type="button" style="display:none;">Eliminar producto</button>
  </div>
</div>

<div id="confirmOverlay">
  <div id="confirmModal">
    <p id="confirmText">¿Eliminar este producto?</p>
    <div class="modalActions">
      <button id="confirmCancelBtn" type="button">Cancelar</button>
      <button id="confirmDeleteBtn" type="button">Eliminar</button>
    </div>
  </div>
</div>

<div id="celebrateOverlay" aria-hidden="true">
  <div id="celebrateBadge">
    <svg class="checkIcon" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
    <span class="ray" style="--angle:0deg"></span>
    <span class="ray" style="--angle:45deg"></span>
    <span class="ray" style="--angle:90deg"></span>
    <span class="ray" style="--angle:135deg"></span>
    <span class="ray" style="--angle:180deg"></span>
    <span class="ray" style="--angle:225deg"></span>
    <span class="ray" style="--angle:270deg"></span>
    <span class="ray" style="--angle:315deg"></span>
  </div>
  <div id="celebrateLabel"></div>
</div>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "preciosApp.productos.v1";
  const FIRESTORE_COLLECTION = "productos-venlista";

  let products = [];
  let editingId = null;
  let pendingDeleteId = null;
  let searchFocused = false;
  let expandedItem = null;

  // Estado del buscador de categorías
  let categoryMatches = [];
  let categoryHighlightIndex = -1;
  let categoryOpen = false;

  // Estado de la sincronización con Firestore (ver sección al final del archivo)
  let firestoreReady = false;
  let db = null;
  let productsCollection = null;
  let migrationChecked = false;

  const searchInput = document.getElementById("searchInput");
  const clearSearchBtn = document.getElementById("clearSearchBtn");
  const resultsEl = document.getElementById("results");
  const addBtn = document.getElementById("addBtn");

  const modalOverlay = document.getElementById("modalOverlay");
  const fieldName = document.getElementById("fieldName");
  const categorySelectEl = document.getElementById("categorySelect");
  const fieldCategory = document.getElementById("fieldCategory");
  const categoryOptionsListEl = document.getElementById("categoryOptionsList");
  const fieldKeywords = document.getElementById("fieldKeywords");
  const fieldPrice = document.getElementById("fieldPrice");
  const deleteBtn = document.getElementById("deleteBtn");
  const cancelBtn = document.getElementById("cancelBtn");
  const saveBtn = document.getElementById("saveBtn");

  const confirmOverlay = document.getElementById("confirmOverlay");
  const confirmText = document.getElementById("confirmText");
  const confirmCancelBtn = document.getElementById("confirmCancelBtn");
  const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");

  const celebrateOverlay = document.getElementById("celebrateOverlay");
  const celebrateLabel = document.getElementById("celebrateLabel");
  let celebrateTimer = null;

  const syncDot = document.getElementById("syncDot");
  const toastContainer = document.getElementById("toastContainer");

  // ---------- Indicador de sync y toasts ----------

  function setSyncStatus(status){
    syncDot.className = "";
    if (status) syncDot.classList.add(status);
  }

  function showToast(msg, isError, duration){
    const t = document.createElement("div");
    t.className = "toast" + (isError ? " error" : "");
    t.textContent = msg;
    toastContainer.appendChild(t);
    const ms = duration || (isError ? 5000 : 3000);
    setTimeout(() => {
      t.style.animation = "toastOut .25s ease forwards";
      setTimeout(() => { if (t.parentNode) t.parentNode.removeChild(t); }, 260);
    }, ms);
  }

  // ---------- Persistencia local (caché para búsqueda instantánea) ----------

  function loadProducts(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      products = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(products)) products = [];
    }catch(e){
      products = [];
    }
  }

  function saveProducts(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    }catch(e){
      // almacenamiento no disponible; se ignora silenciosamente
    }
  }

  function genId(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  // ---------- Formato de precio ----------

  function formatPrice(value){
    let num = Number(value);
    if (!isFinite(num)) num = 0;
    const rounded = Math.round((num + Number.EPSILON) * 100) / 100;
    const isInteger = Number.isInteger(rounded);
    let intPart, decPart;
    if (isInteger){
      intPart = String(Math.abs(rounded));
      decPart = "";
    }else{
      const fixed = Math.abs(rounded).toFixed(2);
      const parts = fixed.split(".");
      intPart = parts[0];
      decPart = parts[1];
    }
    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    const sign = rounded < 0 ? "-" : "";
    return sign + intPart + (decPart ? "." + decPart : "");
  }

  // ---------- Normalización (tildes / mayúsculas / errores) ----------

  function normalize(str){
    return (str || "")
      .toString()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function levenshtein(a, b){
    if (a === b) return 0;
    const al = a.length, bl = b.length;
    if (al === 0) return bl;
    if (bl === 0) return al;
    let prev = new Array(bl + 1);
    for (let j = 0; j <= bl; j++) prev[j] = j;
    for (let i = 1; i <= al; i++){
      const curr = new Array(bl + 1);
      curr[0] = i;
      for (let j = 1; j <= bl; j++){
        if (a[i - 1] === b[j - 1]){
          curr[j] = prev[j - 1];
        }else{
          curr[j] = Math.min(prev[j - 1] + 1, curr[j - 1] + 1, prev[j] + 1);
        }
      }
      prev = curr;
    }
    return prev[bl];
  }

  function typoThreshold(len){
    if (len <= 2) return 0;
    if (len <= 4) return 1;
    if (len <= 7) return 2;
    return 3;
  }

  function wordMatchScore(token, word){
    if (!word) return 0;
    if (word === token) return 3;
    if (word.indexOf(token) !== -1 || token.indexOf(word) !== -1) return 2;
    const threshold = typoThreshold(token.length);
    if (threshold === 0) return 0;
    const dist = levenshtein(token, word);
    if (dist <= threshold) return 1.5 - (dist / (threshold + 1)) * 0.6;
    return 0;
  }

  function productFieldWords(product){
    const words = [];
    normalize(product.name).split(/\s+/).forEach(w => { if (w) words.push(w); });
    normalize(product.category).split(/\s+/).forEach(w => { if (w) words.push(w); });
    normalize(product.keywords).split(/[\s,]+/).forEach(w => { if (w) words.push(w); });
    return words;
  }

  function tokenScoreForProduct(token, words, product){
    let best = 0;
    for (let i = 0; i < words.length; i++){
      const s = wordMatchScore(token, words[i]);
      if (s > best) best = s;
    }
    if (/^\d+(\.\d+)?$/.test(token)){
      const rawPrice = String(product.price);
      const formattedPrice = formatPrice(product.price).replace(/,/g, "");
      if (rawPrice === token || formattedPrice === token){
        best = Math.max(best, 3);
      }else if (rawPrice.indexOf(token) !== -1 || formattedPrice.indexOf(token) !== -1){
        best = Math.max(best, 2.2);
      }
    }
    return best;
  }

  function searchProducts(query){
    const q = normalize(query);
    if (!q) return [];
    const tokens = q.split(/\s+/).filter(Boolean);
    const scored = [];
    for (let i = 0; i < products.length; i++){
      const product = products[i];
      const words = productFieldWords(product);
      let total = 0;
      let allMatch = true;
      for (let t = 0; t < tokens.length; t++){
        const s = tokenScoreForProduct(tokens[t], words, product);
        if (s <= 0){ allMatch = false; break; }
        total += s;
      }
      if (allMatch) scored.push({ product, score: total });
    }
    scored.sort((a, b) => b.score - a.score);
    return scored.map(s => s.product);
  }

  // ---------- Categoría: buscador / autocompletar ----------

  function getCategories(){
    return Array.from(new Set(products.map(p => p.category).filter(Boolean)))
      .sort((a, b) => a.localeCompare(b, "es"));
  }

  function filterCategories(query){
    const all = getCategories();
    const nq = normalize(query);
    if (!nq) return all;
    return all.filter(c => normalize(c).indexOf(nq) !== -1);
  }

  function renderCategorySuggestions(){
    categoryOptionsListEl.innerHTML = "";
    categoryMatches.forEach((cat, idx) => {
      const div = document.createElement("div");
      div.className = "customSelectOption" + (idx === categoryHighlightIndex ? " highlighted" : "");
      div.setAttribute("role", "option");
      div.textContent = cat;
      div.addEventListener("mousedown", (e) => e.preventDefault());
      div.addEventListener("click", () => selectCategorySuggestion(idx));
      categoryOptionsListEl.appendChild(div);
    });
  }

  function openCategorySuggestions(){
    categoryMatches = filterCategories(fieldCategory.value);
    categoryHighlightIndex = -1;
    renderCategorySuggestions();
    const hasMatches = categoryMatches.length > 0;
    categoryOptionsListEl.classList.toggle("open", hasMatches);
    categoryOpen = hasMatches;
  }

  function closeCategorySuggestions(){
    categoryOptionsListEl.classList.remove("open");
    categoryOpen = false;
    categoryHighlightIndex = -1;
  }

  function selectCategorySuggestion(idx){
    const cat = categoryMatches[idx];
    if (cat === undefined) return;
    fieldCategory.value = cat;
    fieldCategory.style.borderColor = "";
    closeCategorySuggestions();
    unlockInput(fieldKeywords);
    fieldKeywords.focus();
  }

  // Si lo escrito coincide con una categoría ya existente (solo distinta en
  // tildes/mayúsculas), la corrige a la versión ya guardada para no duplicar.
  function finalizeCategoryInput(){
    const typed = fieldCategory.value.trim();
    closeCategorySuggestions();
    if (!typed) return;
    const nTyped = normalize(typed);
    const existing = getCategories().find(c => normalize(c) === nTyped);
    if (existing && existing !== typed){
      fieldCategory.value = existing;
    }
  }

  function resetCategoryField(value){
    fieldCategory.value = value || "";
    closeCategorySuggestions();
    fieldCategory.style.borderColor = "";
  }

  fieldCategory.addEventListener("input", () => {
    fieldCategory.style.borderColor = "";
    openCategorySuggestions();
  });

  fieldCategory.addEventListener("focus", () => {
    openCategorySuggestions();
  });

  fieldCategory.addEventListener("blur", () => {
    setTimeout(finalizeCategoryInput, 0);
  });

  fieldCategory.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown"){
      e.preventDefault();
      if (!categoryOpen) openCategorySuggestions();
      if (categoryMatches.length){
        categoryHighlightIndex = Math.min(categoryHighlightIndex + 1, categoryMatches.length - 1);
        renderCategorySuggestions();
      }
    }else if (e.key === "ArrowUp"){
      e.preventDefault();
      if (categoryMatches.length){
        categoryHighlightIndex = Math.max(categoryHighlightIndex - 1, 0);
        renderCategorySuggestions();
      }
    }else if (e.key === "Enter"){
      e.preventDefault();
      if (categoryOpen && categoryHighlightIndex >= 0 && categoryMatches[categoryHighlightIndex] !== undefined){
        selectCategorySuggestion(categoryHighlightIndex);
      }else{
        finalizeCategoryInput();
        focusNext(fieldCategory);
      }
    }else if (e.key === "Escape"){
      if (categoryOpen){
        e.preventDefault();
        e.stopPropagation();
        closeCategorySuggestions();
      }
    }
  });

  document.addEventListener("click", (e) => {
    if (categoryOpen && !categorySelectEl.contains(e.target)){
      closeCategorySuggestions();
    }
  });

  // ---------- Modal: agregar / editar ----------

  function clearFieldErrors(){
    [fieldName, fieldCategory, fieldPrice].forEach(f => f.style.borderColor = "");
  }

  function openAddModal(){
    editingId = null;
    fieldName.value = "";
    resetCategoryField("");
    fieldKeywords.value = "";
    fieldPrice.value = "";
    clearFieldErrors();
    deleteBtn.style.display = "none";
    modalOverlay.classList.add("open");

  function openEditModal(id){
    const p = products.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    fieldName.value = p.name;
    resetCategoryField(p.category || "");
    fieldKeywords.value = p.keywords || "";
    fieldPrice.value = p.price;
    clearFieldErrors();
    deleteBtn.style.display = "inline-block";
    modalOverlay.classList.add("open");
    unlockInput(fieldName);
    setTimeout(() => fieldName.focus(), 80);
  }

  function closeModal(){
    modalOverlay.classList.remove("open");
    closeCategorySuggestions();
  }

  function handleSave(){
    const name = fieldName.value.trim();
    finalizeCategoryInput();
    const categoryTyped = fieldCategory.value.trim();
    const keywords = fieldKeywords.value.trim();
    const priceVal = parseFloat(fieldPrice.value);

    clearFieldErrors();

    if (!name){
      fieldName.style.borderColor = "#666666";
      fieldName.focus();
      return;
    }
    if (!categoryTyped){
      fieldCategory.style.borderColor = "#666666";
      fieldCategory.focus();
      return;
    }
    if (!isFinite(priceVal) || priceVal < 0){
      fieldPrice.style.borderColor = "#666666";
      fieldPrice.focus();
      return;
    }

    // Si ya existe una categoría igual (solo con distinta tilde/mayúscula),
    // usamos la versión ya guardada en vez de crear una casi-duplicada.
    const nCategory = normalize(categoryTyped);
    const existingCategory = getCategories().find(c => normalize(c) === nCategory);
    const category = existingCategory || categoryTyped;

    const data = { name, category, keywords, price: priceVal };
    const isNewProduct = !editingId;

    if (firestoreReady){
      // Con Firestore activo, el listener onSnapshot (ver abajo) se encarga
      // de reflejar el cambio en pantalla y en la copia local en cuanto
      // Firestore confirme el cambio (incluso sin conexión, gracias a su
      // caché propia, esto suele sentirse instantáneo).
      if (editingId){
        fsWrite(productsCollection.doc(editingId).update(data), "Error al actualizar el producto.");
      }else{
        fsWrite(productsCollection.add(data), "Error al agregar el producto.");
      }
    }else{
      // Sin Firestore configurado: el comportamiento es 100% local, igual que antes.
      if (editingId){
        const p = products.find(x => x.id === editingId);
        if (p){
          p.name = name;
          p.category = category;
          p.keywords = keywords;
          p.price = priceVal;
        }
      }else{
        products.push({ id: genId(), name, category, keywords, price: priceVal });
      }
      saveProducts();
      refreshView();
    }

    if (isNewProduct){
      celebrateAdded(name);
    }

    closeModal();
  }

  addBtn.addEventListener("click", openAddModal);
  cancelBtn.addEventListener("click", closeModal);
  saveBtn.addEventListener("click", handleSave);

  modalOverlay.addEventListener("click", (e) => {

  });

  // ---------- Celebración al agregar un producto nuevo ----------

    celebrateOverlay.classList.remove("show");

  // ---------- Enter -> siguiente campo ----------

  function getFieldOrder(){
    return [fieldName, fieldCategory, fieldKeywords, fieldPrice];
  }

  function focusNext(current){
    const order = getFieldOrder();
    const idx = order.indexOf(current);
    if (idx === -1) return;
    if (idx === order.length - 1){
      handleSave();
    }else{
      const next = order[idx + 1];
      unlockInput(next);
      next.focus();
      if (next.tagName === "INPUT" && typeof next.select === "function") next.select();
    }

  [fieldName, fieldKeywords, fieldPrice].forEach(f => {

  // ====================================================================
  // ---------- Evitar la barra de autocompletado del navegador ----------
  // ====================================================================
  // En Chrome para Android, al enfocar un campo de texto puede aparecer
  // una barra arriba del teclado con accesos a contraseñas, tarjetas y
  // direcciones guardadas. No hay un atributo HTML 100% garantizado para
  // desactivarla (es un comportamiento del propio Chrome/Android, no solo
  // de esta página), pero el truco más efectivo y usado es: el campo
  // empieza en "solo lectura" para que el navegador no lo detecte como
  // un campo "rellenable", y se vuelve editable justo en el momento en
  // que la persona realmente lo toca o entra a él a propósito.

  function unlockInput(input){
    input.removeAttribute("readonly");
  }

  function disableAutofillBar(input){
    input.setAttribute("readonly", "");
    function unlock(e){
      if (e && e.isTrusted === false) return; // ignora foco/touch disparado por nuestro propio código
      input.removeAttribute("readonly");
      input.removeEventListener("focus", unlock);
      input.removeEventListener("touchstart", unlock);
    }
    input.addEventListener("focus", unlock);
    input.addEventListener("touchstart", unlock, { passive: true });
  }

  // ====================================================================
  // ---------- Firebase / Firestore: sincronización en la nube ----------
  // ====================================================================
  //
  // Idea general:
  // 1) Al entrar, ya se ve algo de inmediato porque `loadProducts()` lee
  //    la última copia guardada en localStorage (búsqueda instantánea).
  // 2) En paralelo, si configuraste tus claves de Firebase, nos conectamos
  //    a Firestore y nos "suscribimos" a la colección con onSnapshot: esto
  //    no es una descarga única, sino que se queda escuchando y avisa cada
  //    vez que algo cambia (incluso si lo cambiaste desde otro dispositivo).
  // 3) Cada vez que llega información nueva de Firestore, se reemplaza la
  //    lista en memoria y se vuelve a guardar en localStorage, así esa
  //    copia local siempre queda al día para la próxima vez que entres
  //    (incluso con mala conexión).
  // 4) Si es la primera vez que conectas Firestore y ya tenías productos
  //    guardados solo de forma local, se suben automáticamente una vez
  //    para no perderlos.
  // 5) Si no configuraste tus claves (o Firebase no carga por alguna
  //    razón), la página sigue funcionando exactamente igual que antes,
  //    100% local.

  function initFirebase(){
    // Si las librerías no cargaron (sin internet al abrir), quedamos en modo local.
    if (typeof firebase === "undefined"){
      console.log("[Firebase] SDK no disponible — modo local.");
      return;
    }
    // Si las claves son las de ejemplo, modo local.
    if (!firebaseConfig || !firebaseConfig.apiKey || firebaseConfig.apiKey === "..."){
      console.log("[Firebase] Claves no configuradas — modo local.");
      return;
    }

    try{
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();

      // Offline persistence: permite trabajar sin internet y sincroniza al volver.
      // Si falla (múltiples pestañas, navegador privado, etc.) la app sigue andando
      // normalmente, solo sin caché offline de Firestore.
      db.enablePersistence({ synchronizeTabs: true })
        .then(() => console.log("[Firebase] Persistencia offline activa."))
        .catch((err) => {
          if (err.code === "failed-precondition"){
            console.log("[Firebase] Persistencia desactivada (múltiples pestañas abiertas).");
          }else if (err.code === "unimplemented"){
            console.log("[Firebase] Persistencia no soportada en este navegador.");
          }else{
            console.warn("[Firebase] Error en persistencia:", err);
          }
        });

      productsCollection = db.collection(FIRESTORE_COLLECTION);
      firestoreReady = true;
      setSyncStatus("connecting");
      console.log("[Firebase] Conectando a la colección:", FIRESTORE_COLLECTION);
      subscribeToProducts();

    }catch(e){
      console.error("[Firebase] Error al inicializar:", e);
      setSyncStatus("error");
      showToast("No se pudo conectar a la nube. Los datos se guardan solo localmente.", true);
      firestoreReady = false;
    }
  }

  function subscribeToProducts(){
    if (!productsCollection) return;

    productsCollection.onSnapshot(
      // ── Llegó una actualización de Firestore ──
      (snapshot) => {
        const remote = [];
        snapshot.forEach((docSnap) => {
          const d = docSnap.data() || {};
          remote.push({
            id: docSnap.id,
            name: d.name || "",
            category: d.category || "",
            keywords: d.keywords || "",
            price: typeof d.price === "number" ? d.price : (parseFloat(d.price) || 0)
          });
        });

        setSyncStatus("synced");
        console.log("[Firebase] Snapshot recibido:", remote.length, "productos.");

        // Migración única: si Firestore está vacío pero ya teníamos datos
        // locales, los subimos para no perderlos al cambiar de dispositivo.
        if (!migrationChecked){
          migrationChecked = true;
          if (remote.length === 0 && products.length > 0){
            console.log("[Firebase] Firestore vacío, migrando", products.length, "productos locales...");
            migrateLocalProductsToFirestore(products);
            return; // el listener se vuelve a disparar cuando termine la migración
          }
        }

        products = remote;
        saveProducts();
        refreshView();
      },
      // ── Error en el listener (permisos, red, etc.) ──
      (error) => {
        console.error("[Firebase] Error en onSnapshot:", error);
        setSyncStatus("error");

        let msg = "Error al sincronizar con la nube.";
        if (error.code === "permission-denied"){
          msg = "Permiso denegado en Firestore. Revisá las reglas de seguridad en Firebase Console.";
        }else if (error.code === "unavailable"){
          msg = "Firestore no disponible. Verificá la conexión a internet.";
        }
        showToast(msg, true, 8000);
      }
    );
  }

  function migrateLocalProductsToFirestore(localProducts){
    const batch = db.batch();
    localProducts.forEach((p) => {
      const ref = productsCollection.doc();
      batch.set(ref, {
        name: p.name || "",
        category: p.category || "",
        keywords: p.keywords || "",
        price: typeof p.price === "number" ? p.price : (parseFloat(p.price) || 0)
      });
    });
    batch.commit()
      .then(() => console.log("[Firebase] Migración completada."))
      .catch((err) => {
        console.error("[Firebase] Error al migrar productos locales:", err);
        showToast("No se pudieron subir los productos existentes a la nube.", true);
      });
  }

  // Wrapper para writes con feedback visible si fallan
  function fsWrite(promise, errorMsg){
    setSyncStatus("connecting");
    return promise
      .then(() => setSyncStatus("synced"))
      .catch((err) => {
        console.error("[Firebase] Error al escribir:", err);
        setSyncStatus("error");
        let detail = errorMsg || "Error al guardar en la nube.";
        if (err.code === "permission-denied"){
          detail = "Permiso denegado. Revisá las reglas de seguridad en Firebase Console.";
        }
        showToast(detail, true, 7000);
      });
  }

  // ---------- Inicio ----------

  loadProducts();           // copia local: lista para buscar al instante
  updateAddBtnVisibility();
  updateClearButton();
  [searchInput, fieldName, fieldCategory, fieldKeywords, fieldPrice].forEach(disableAutofillBar);
  initFirebase();            // si hay claves configuradas, sincroniza con Firestore

})();
</script>
</body>
