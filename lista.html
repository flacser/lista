<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="color-scheme" content="dark">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Precios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#000000;
    --fg:#ffffff;
    --muted:#8a8a8a;
    --surface:#0d0d0d;
    --surface-2:#141414;
    --border:#1f1f1f;
    --border-strong:#3a3a3a;
    --ease-spring: cubic-bezier(.34,1.56,.64,1);
  }

  *{ box-sizing:border-box; }

  html, body{
    margin:0;
    padding:0;
    width:100%;
    min-height:100%;
    background:var(--bg);
    color:var(--fg);
  }

  body{
    font-family:'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior:none;
    min-height:100vh;
    min-height:100dvh;
    animation:pageFade .45s ease;
  }

  @keyframes pageFade{ from{ opacity:0; } to{ opacity:1; } }

  button, input, select{ font-family:inherit; }

  :focus{ outline:none; }
  :focus-visible{ outline:2px solid var(--fg); outline-offset:2px; border-radius:4px; }

  /* ---------- Header / búsqueda ---------- */

  #searchHeader{
    position:fixed;
    top:0; left:0; right:0;
    z-index:30;
    display:flex;
    justify-content:center;
    padding:calc(22px + env(safe-area-inset-top)) 20px 14px;
    background:var(--bg);
  }

  #searchWrap{
    position:relative;
    width:100%;
    max-width:560px;
  }

  #searchInput{
    width:100%;
    text-align:center;
    background:var(--surface);
    border:1px solid var(--border);
    color:var(--fg);
    font-size:1.05rem;
    padding:17px 22px;
    border-radius:999px;
    transition:border-color .2s ease, box-shadow .2s ease, background .2s ease, padding-right .15s ease;
  }

  #searchInput.hasClear{ padding-right:52px; }
  #searchInput::placeholder{ color:var(--muted); text-align:center; }
  #searchInput:focus{ border-color:var(--border-strong); box-shadow:0 0 0 5px rgba(255,255,255,0.05); }

  #clearSearchBtn{
    position:absolute;
    top:50%;
    right:8px;
    width:34px;
    height:34px;
    border-radius:50%;
    border:none;
    background:#1c1c1c;
    color:var(--fg);
    font-size:1.25rem;
    line-height:1;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    opacity:0;
    pointer-events:none;
    transform:translateY(-50%) scale(.6);
    transition:opacity .15s ease, transform .2s var(--ease-spring), background .15s ease;
  }

  #clearSearchBtn.show{ opacity:1; pointer-events:auto; transform:translateY(-50%) scale(1); }
  #clearSearchBtn:hover{ background:#2a2a2a; }
  #clearSearchBtn:active{ transform:translateY(-50%) scale(.85); }

  /* ---------- Contenido / resultados ---------- */

  #app{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:100px 20px 150px;
  }

  #results{
    width:100%;
    max-width:560px;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  @keyframes itemIn{
    from{ opacity:0; transform:translateY(10px) scale(.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }

  .resultItem{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    overflow:hidden;
    transition:border-color .15s ease;
    animation:itemIn .35s var(--ease-spring) both;
  }

  .resultItem:hover, .resultItem.expanded{ border-color:var(--border-strong); }

  .resultRow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:14px;
    padding:15px 18px;
    cursor:pointer;
    transition:background .15s ease;
  }

  .resultRow:hover{ background:#111111; }
  .resultRow:active{ background:#161616; }

  .resultInfo{
    display:flex;
    flex-direction:column;
    gap:3px;
    min-width:0;
  }

  .resultName{
    font-weight:600;
    font-size:1rem;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .resultMeta{
    font-size:0.78rem;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .resultPrice{
    font-weight:700;
    font-size:1.4rem;
    white-space:nowrap;
    flex-shrink:0;
    display:flex;
    align-items:baseline;
  }

  .currency{
    font-weight:500;
    font-size:0.5em;
    opacity:0.65;
    margin-right:3px;
  }

  .editReveal{
    max-height:0;
    opacity:0;
    overflow:hidden;
    transition:max-height .25s ease, opacity .2s ease;
  }

  .resultItem.expanded .editReveal{ max-height:64px; opacity:1; }

  .editBtn{
    display:block;
    width:100%;
    padding:13px 0;
    border:none;
    border-top:1px solid var(--border);
    background:transparent;
    color:var(--fg);
    font-size:0.92rem;
    font-weight:600;
    cursor:pointer;
    transition:background .15s ease;
  }

  .editBtn:hover{ background:#161616; }
  .editBtn:active{ background:#1c1c1c; }

  .empty{
    color:var(--muted);
    text-align:center;
    margin-top:18px;
    font-size:0.92rem;
    animation:itemIn .35s ease both;
  }

  /* ---------- Botón + ---------- */

  #addBtn{
    position:fixed;
    bottom:calc(30px + env(safe-area-inset-bottom));
    left:50%;
    width:66px;
    height:66px;
    border-radius:50%;
    background:var(--fg);
    color:var(--bg);
    border:none;
    font-size:2rem;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 20px rgba(255,255,255,0.16);
    transition:transform .3s var(--ease-spring), opacity .2s ease, box-shadow .2s ease;
    transform:translateX(-50%) scale(1);
    z-index:20;
  }

  #addBtn span{ margin-top:-3px; }
  #addBtn:hover{ transform:translateX(-50%) scale(1.07); box-shadow:0 8px 24px rgba(255,255,255,0.24); }
  #addBtn:active{ transform:translateX(-50%) scale(0.92); }

  #addBtn.hidden{
    opacity:0;
    transform:translateX(-50%) translateY(24px) scale(.7);
    pointer-events:none;
  }

  /* ---------- Modal: producto ---------- */

  #modalOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.72);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity .2s ease, visibility .2s ease;
  }

  #modalOverlay.open{ opacity:1; visibility:visible; pointer-events:auto; }

  #modal{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:26px;
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    gap:16px;
    transform:scale(.92) translateY(12px);
    opacity:0;
    transition:transform .3s var(--ease-spring), opacity .2s ease;
  }

  #modalOverlay.open #modal{ transform:scale(1) translateY(0); opacity:1; }

  .field{
    display:flex;
    flex-direction:column;
    gap:7px;
    width:100%;
  }

  .field label{
    font-size:0.78rem;
    color:var(--muted);
    padding-left:3px;
    letter-spacing:.01em;
  }

  #modal input{
    background:#000000;
    border:1px solid var(--border);
    color:var(--fg);
    padding:13px 16px;
    border-radius:10px;
    font-size:0.95rem;
    width:100%;
    transition:border-color .15s ease;
  }

  #modal input::placeholder{ color:#555555; }
  #modal input:focus{ border-color:var(--border-strong); }

  /* ---------- Desplegable de categoría (estilo propio) ---------- */

  .customSelect{ position:relative; width:100%; }

  .customSelectTrigger{
    width:100%;
    background:#000000;
    border:1px solid var(--border);
    color:var(--fg);
    padding:13px 16px;
    border-radius:10px;
    font-size:0.95rem;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    cursor:pointer;
    text-align:left;
    transition:border-color .15s ease;
  }

  .customSelectTrigger:hover, .customSelectTrigger.open{ border-color:var(--border-strong); }
  .customSelectTrigger span{ overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .customSelectTrigger .chevron{
    width:16px; height:16px; flex-shrink:0;
    color:var(--muted);
    transition:transform .2s ease;
  }

  .customSelectTrigger.open .chevron{ transform:rotate(180deg); }

  .customSelectList{
    position:absolute;
    top:calc(100% + 8px);
    left:0; right:0;
    background:var(--surface-2);
    border:1px solid var(--border-strong);
    border-radius:12px;
    padding:6px;
    max-height:230px;
    overflow-y:auto;
    z-index:5;
    box-shadow:0 14px 34px rgba(0,0,0,0.55);
    opacity:0;
    visibility:hidden;
    transform:translateY(-6px) scale(.98);
    transform-origin:top center;
    transition:opacity .15s ease, transform .18s var(--ease-spring), visibility .15s ease;
  }

  .customSelectList.open{ opacity:1; visibility:visible; transform:translateY(0) scale(1); }

  .customSelectOption{
    padding:11px 13px;
    border-radius:8px;
    font-size:0.92rem;
    cursor:pointer;
    transition:background .12s ease;
  }

  .customSelectOption.newOption{
    color:var(--muted);
    border-top:1px solid var(--border);
    margin-top:4px;
    padding-top:13px;
  }

  .customSelectOption:hover, .customSelectOption.highlighted{ background:#222222; }
  .customSelectOption.newOption:hover, .customSelectOption.newOption.highlighted{ background:#222222; color:var(--fg); }

  .customSelectOption.selected{ background:var(--fg); color:var(--bg); font-weight:600; }

  @keyframes fieldPop{
    from{ opacity:0; transform:translateY(-6px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .newCategoryField{ display:none; }
  .field-pop{ animation:fieldPop .25s ease; }

  .modalActions{
    display:flex;
    justify-content:center;
    gap:12px;
    margin-top:6px;
  }

  .modalActions button{
    flex:1;
    max-width:170px;
    padding:15px 0;
    border-radius:13px;
    cursor:pointer;
    font-size:0.96rem;
    font-weight:600;
    border:1px solid var(--border);
    background:transparent;
    color:var(--fg);
    transition:background .15s ease, border-color .15s ease, transform .15s ease;
  }

  .modalActions button:hover{ background:#1a1a1a; border-color:var(--border-strong); }
  .modalActions button:active{ transform:scale(.97); }

  #saveBtn, #confirmDeleteBtn{
    background:var(--fg);
    color:var(--bg);
    border:none;
  }

  #saveBtn:hover, #confirmDeleteBtn:hover{ background:#e2e2e2; }

  #deleteBtn{
    align-self:center;
    background:none;
    border:none;
    color:var(--muted);
    text-decoration:underline;
    font-size:0.85rem;
    padding:2px 0;
    cursor:pointer;
    transition:color .15s ease;
  }

  #deleteBtn:hover{ color:var(--fg); background:none; }

  /* ---------- Modal: confirmar borrado ---------- */

  #confirmOverlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.78);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:60;
    opacity:0;
    visibility:hidden;
    pointer-events:none;
    transition:opacity .2s ease, visibility .2s ease;
  }

  #confirmOverlay.open{ opacity:1; visibility:visible; pointer-events:auto; }

  #confirmModal{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:26px;
    width:100%;
    max-width:340px;
    display:flex;
    flex-direction:column;
    gap:18px;
    text-align:center;
    transform:scale(.9) translateY(10px);
    opacity:0;
    transition:transform .3s var(--ease-spring), opacity .2s ease;
  }

  #confirmOverlay.open #confirmModal{ transform:scale(1) translateY(0); opacity:1; }

  #confirmText{
    margin:0;
    font-size:1rem;
    line-height:1.45;
    word-break:break-word;
  }

  @media (max-width:480px){
    #searchHeader{ padding:calc(18px + env(safe-area-inset-top)) 16px 12px; }
    #app{ padding:90px 16px 140px; }
    #addBtn{ width:60px; height:60px; font-size:1.8rem; }
    #modal{ padding:22px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition:none !important; animation:none !important; }
  }
</style>
</head>
<body>

<header id="searchHeader">
  <div id="searchWrap">
    <input id="searchInput" type="text" placeholder="Buscar" autocomplete="off" autocapitalize="off" spellcheck="false">
    <button id="clearSearchBtn" type="button" aria-label="Borrar búsqueda">&times;</button>
  </div>
</header>

<main id="app">
  <div id="results"></div>
</main>

<button id="addBtn" aria-label="Agregar producto" aria-haspopup="dialog"><span>+</span></button>

<div id="modalOverlay" role="dialog" aria-modal="true" aria-label="Producto">
  <div id="modal">
    <div class="field">
      <label for="fieldName">Nombre</label>
      <input id="fieldName" type="text" autocomplete="off" enterkeyhint="next">
    </div>

    <div class="field">
      <label for="categoryTrigger">Categoría</label>
      <div class="customSelect" id="categorySelect">
        <button type="button" class="customSelectTrigger" id="categoryTrigger" aria-haspopup="listbox" aria-expanded="false">
          <span id="categoryValueLabel">Sin categoría</span>
          <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </button>
        <div class="customSelectList" id="categoryOptionsList" role="listbox" tabindex="-1"></div>
      </div>
    </div>

    <div class="field newCategoryField" id="newCategoryField">
      <label for="fieldCategoryNew">Nueva categoría</label>
      <input id="fieldCategoryNew" type="text" autocomplete="off" enterkeyhint="next">
    </div>

    <div class="field">
      <label for="fieldKeywords">Palabras clave</label>
      <input id="fieldKeywords" type="text" autocomplete="off" placeholder="separadas por comas" enterkeyhint="next">
    </div>

    <div class="field">
      <label for="fieldPrice">Precio</label>
      <input id="fieldPrice" type="number" step="0.01" min="0" inputmode="decimal" enterkeyhint="done">
    </div>

    <div class="modalActions">
      <button id="cancelBtn" type="button">Cancelar</button>
      <button id="saveBtn" type="button">Guardar</button>
    </div>

    <button id="deleteBtn" type="button" style="display:none;">Eliminar producto</button>
  </div>
</div>

<div id="confirmOverlay">
  <div id="confirmModal">
    <p id="confirmText">¿Eliminar este producto?</p>
    <div class="modalActions">
      <button id="confirmCancelBtn" type="button">Cancelar</button>
      <button id="confirmDeleteBtn" type="button">Eliminar</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const STORAGE_KEY = "preciosApp.productos.v1";
  const FIRESTORE_COLLECTION = "productos";

  let products = [];
  let editingId = null;
  let pendingDeleteId = null;
  let searchFocused = false;
  let expandedItem = null;

  let selectedCategory = "";
  let categoryOptionsData = [];
  let categoryOpen = false;
  let highlightedIndex = -1;

  // Estado de la sincronización con Firestore (ver sección al final del archivo)
  let firestoreReady = false;
  let db = null;
  let productsCollection = null;
  let migrationChecked = false;

  const searchInput = document.getElementById("searchInput");
  const clearSearchBtn = document.getElementById("clearSearchBtn");
  const resultsEl = document.getElementById("results");
  const addBtn = document.getElementById("addBtn");

  const modalOverlay = document.getElementById("modalOverlay");
  const fieldName = document.getElementById("fieldName");
  const categorySelectEl = document.getElementById("categorySelect");
  const categoryTrigger = document.getElementById("categoryTrigger");
  const categoryValueLabel = document.getElementById("categoryValueLabel");
  const categoryOptionsListEl = document.getElementById("categoryOptionsList");
  const newCategoryField = document.getElementById("newCategoryField");
  const fieldCategoryNew = document.getElementById("fieldCategoryNew");
  const fieldKeywords = document.getElementById("fieldKeywords");
  const fieldPrice = document.getElementById("fieldPrice");
  const deleteBtn = document.getElementById("deleteBtn");
  const cancelBtn = document.getElementById("cancelBtn");
  const saveBtn = document.getElementById("saveBtn");

  const confirmOverlay = document.getElementById("confirmOverlay");
  const confirmText = document.getElementById("confirmText");
  const confirmCancelBtn = document.getElementById("confirmCancelBtn");
  const confirmDeleteBtn = document.getElementById("confirmDeleteBtn");

  // ---------- Persistencia local (caché para búsqueda instantánea) ----------

  function loadProducts(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      products = raw ? JSON.parse(raw) : [];
      if (!Array.isArray(products)) products = [];
    }catch(e){
      products = [];
    }
  }

  function saveProducts(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
    }catch(e){
      // almacenamiento no disponible; se ignora silenciosamente
    }
  }

  function genId(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  // ---------- Formato de precio ----------

  function formatPrice(value){
    let num = Number(value);
    if (!isFinite(num)) num = 0;
    const rounded = Math.round((num + Number.EPSILON) * 100) / 100;
    const isInteger = Number.isInteger(rounded);
    let intPart, decPart;
    if (isInteger){
      intPart = String(Math.abs(rounded));
      decPart = "";
    }else{
      const fixed = Math.abs(rounded).toFixed(2);
      const parts = fixed.split(".");
      intPart = parts[0];
      decPart = parts[1];
    }
    intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    const sign = rounded < 0 ? "-" : "";
    return sign + intPart + (decPart ? "." + decPart : "");
  }

  // ---------- Búsqueda tolerante a errores ----------

  function normalize(str){
    return (str || "")
      .toString()
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function levenshtein(a, b){
    if (a === b) return 0;
    const al = a.length, bl = b.length;
    if (al === 0) return bl;
    if (bl === 0) return al;
    let prev = new Array(bl + 1);
    for (let j = 0; j <= bl; j++) prev[j] = j;
    for (let i = 1; i <= al; i++){
      const curr = new Array(bl + 1);
      curr[0] = i;
      for (let j = 1; j <= bl; j++){
        if (a[i - 1] === b[j - 1]){
          curr[j] = prev[j - 1];
        }else{
          curr[j] = Math.min(prev[j - 1] + 1, curr[j - 1] + 1, prev[j] + 1);
        }
      }
      prev = curr;
    }
    return prev[bl];
  }

  function typoThreshold(len){
    if (len <= 2) return 0;
    if (len <= 4) return 1;
    if (len <= 7) return 2;
    return 3;
  }

  function wordMatchScore(token, word){
    if (!word) return 0;
    if (word === token) return 3;
    if (word.indexOf(token) !== -1 || token.indexOf(word) !== -1) return 2;
    const threshold = typoThreshold(token.length);
    if (threshold === 0) return 0;
    const dist = levenshtein(token, word);
    if (dist <= threshold) return 1.5 - (dist / (threshold + 1)) * 0.6;
    return 0;
  }

  function productFieldWords(product){
    const words = [];
    normalize(product.name).split(/\s+/).forEach(w => { if (w) words.push(w); });
    normalize(product.category).split(/\s+/).forEach(w => { if (w) words.push(w); });
    normalize(product.keywords).split(/[\s,]+/).forEach(w => { if (w) words.push(w); });
    return words;
  }

  function tokenScoreForProduct(token, words, product){
    let best = 0;
    for (let i = 0; i < words.length; i++){
      const s = wordMatchScore(token, words[i]);
      if (s > best) best = s;
    }
    if (/^\d+(\.\d+)?$/.test(token)){
      const rawPrice = String(product.price);
      const formattedPrice = formatPrice(product.price).replace(/,/g, "");
      if (rawPrice === token || formattedPrice === token){
        best = Math.max(best, 3);
      }else if (rawPrice.indexOf(token) !== -1 || formattedPrice.indexOf(token) !== -1){
        best = Math.max(best, 2.2);
      }
    }
    return best;
  }

  function searchProducts(query){
    const q = normalize(query);
    if (!q) return [];
    const tokens = q.split(/\s+/).filter(Boolean);
    const scored = [];
    for (let i = 0; i < products.length; i++){
      const product = products[i];
      const words = productFieldWords(product);
      let total = 0;
      let allMatch = true;
      for (let t = 0; t < tokens.length; t++){
        const s = tokenScoreForProduct(tokens[t], words, product);
        if (s <= 0){ allMatch = false; break; }
        total += s;
      }
      if (allMatch) scored.push({ product, score: total });
    }
    scored.sort((a, b) => b.score - a.score);
    return scored.map(s => s.product);
  }

  // ---------- Tarjetas expandibles ----------

  function collapseExpanded(){
    if (expandedItem){
      expandedItem.classList.remove("expanded");
      const btn = expandedItem.querySelector(".editBtn");
      if (btn) btn.tabIndex = -1;
      expandedItem = null;
    }
  }

  function expandItem(item){
    if (expandedItem === item) return;
    collapseExpanded();
    item.classList.add("expanded");
    const btn = item.querySelector(".editBtn");
    if (btn) btn.tabIndex = 0;
    expandedItem = item;
  }

  function toggleItem(item){
    if (item.classList.contains("expanded")){
      collapseExpanded();
    }else{
      expandItem(item);
    }
  }

  document.addEventListener("click", (e) => {
    if (expandedItem && !expandedItem.contains(e.target)){
      collapseExpanded();
    }
  });

  // ---------- Render resultados ----------

  function clearResults(){
    resultsEl.innerHTML = "";
    expandedItem = null;
  }

  function renderResults(list){
    resultsEl.innerHTML = "";
    expandedItem = null;

    if (list.length === 0){
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "Sin resultados";
      resultsEl.appendChild(empty);
      return;
    }

    list.forEach((p, i) => {
      const item = document.createElement("div");
      item.className = "resultItem";
      item.style.animationDelay = Math.min(i * 0.04, 0.3) + "s";

      const row = document.createElement("div");
      row.className = "resultRow";
      row.tabIndex = 0;
      row.setAttribute("role", "button");

      const info = document.createElement("div");
      info.className = "resultInfo";

      const name = document.createElement("div");
      name.className = "resultName";
      name.textContent = p.name;
      info.appendChild(name);

      if (p.category){
        const meta = document.createElement("div");
        meta.className = "resultMeta";
        meta.textContent = p.category;
        info.appendChild(meta);
      }

      const price = document.createElement("div");
      price.className = "resultPrice";
      const currency = document.createElement("span");
      currency.className = "currency";
      currency.textContent = "Q";
      price.appendChild(currency);
      price.appendChild(document.createTextNode(formatPrice(p.price)));

      row.appendChild(info);
      row.appendChild(price);

      row.addEventListener("click", () => toggleItem(item));
      row.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " "){
          e.preventDefault();
          toggleItem(item);
        }
      });

      const reveal = document.createElement("div");
      reveal.className = "editReveal";

      const editBtnEl = document.createElement("button");
      editBtnEl.type = "button";
      editBtnEl.className = "editBtn";
      editBtnEl.textContent = "Editar";
      editBtnEl.tabIndex = -1;
      editBtnEl.addEventListener("click", (e) => {
        e.stopPropagation();
        openEditModal(p.id);
      });
      reveal.appendChild(editBtnEl);

      item.appendChild(row);
      item.appendChild(reveal);
      resultsEl.appendChild(item);
    });
  }

  function refreshView(){
    const q = searchInput.value;
    if (q.trim()){
      renderResults(searchProducts(q));
    }else{
      clearResults();
    }
  }

  // ---------- Visibilidad botón + / botón borrar búsqueda ----------

  function updateAddBtnVisibility(){
    const shouldHide = searchFocused || searchInput.value.trim() !== "";
    addBtn.classList.toggle("hidden", shouldHide);
  }

  function updateClearButton(){
    const hasText = searchInput.value.length > 0;
    clearSearchBtn.classList.toggle("show", hasText);
    searchInput.classList.toggle("hasClear", hasText);
  }

  searchInput.addEventListener("input", () => {
    const q = searchInput.value;
    if (q.trim()){
      renderResults(searchProducts(q));
    }else{
      clearResults();
    }
    updateAddBtnVisibility();
    updateClearButton();
  });

  searchInput.addEventListener("focus", () => {
    searchFocused = true;
    updateAddBtnVisibility();
  });

  searchInput.addEventListener("blur", () => {
    searchFocused = false;
    updateAddBtnVisibility();
  });

  clearSearchBtn.addEventListener("mousedown", (e) => e.preventDefault());
  clearSearchBtn.addEventListener("click", () => {
    searchInput.value = "";
    clearResults();
    updateClearButton();
    updateAddBtnVisibility();
    searchInput.focus();
  });

  // ---------- Categorías (desplegable propio) ----------

  function getCategories(){
    return Array.from(new Set(products.map(p => p.category).filter(Boolean)))
      .sort((a, b) => a.localeCompare(b, "es"));
  }

  function renderCategoryOptionsList(){
    categoryOptionsListEl.innerHTML = "";
    categoryOptionsData.forEach((opt, idx) => {
      const div = document.createElement("div");
      let cls = "customSelectOption";
      if (opt.value === selectedCategory) cls += " selected";
      if (opt.isNew) cls += " newOption";
      div.className = cls;
      div.setAttribute("role", "option");
      div.textContent = opt.label;
      div.addEventListener("click", () => selectCategoryOption(idx));
      categoryOptionsListEl.appendChild(div);
    });
  }

  function buildCategoryOptions(selected){
    const cats = getCategories();
    categoryOptionsData = [{ value: "", label: "Sin categoría" }]
      .concat(cats.map(c => ({ value: c, label: c })))
      .concat([{ value: "__new__", label: "+ Nueva categoría", isNew: true }]);

    selectedCategory = selected || "";
    const match = categoryOptionsData.find(o => o.value === selectedCategory);
    categoryValueLabel.textContent = match ? match.label : "Sin categoría";
    renderCategoryOptionsList();
    closeCategoryList();
  }

  function applyHighlight(){
    const opts = categoryOptionsListEl.querySelectorAll(".customSelectOption");
    opts.forEach((el, i) => el.classList.toggle("highlighted", i === highlightedIndex));
    const hl = opts[highlightedIndex];
    if (hl) hl.scrollIntoView({ block: "nearest" });
  }

  function openCategoryList(){
    categoryOpen = true;
    categoryOptionsListEl.classList.add("open");
    categoryTrigger.classList.add("open");
    categoryTrigger.setAttribute("aria-expanded", "true");
    highlightedIndex = categoryOptionsData.findIndex(o => o.value === selectedCategory);
    if (highlightedIndex < 0) highlightedIndex = 0;
    applyHighlight();
  }

  function closeCategoryList(){
    categoryOpen = false;
    categoryOptionsListEl.classList.remove("open");
    categoryTrigger.classList.remove("open");
    categoryTrigger.setAttribute("aria-expanded", "false");
  }

  function selectCategoryOption(idx){
    const opt = categoryOptionsData[idx];
    if (!opt) return;
    selectedCategory = opt.value;
    categoryValueLabel.textContent = opt.label;
    renderCategoryOptionsList();
    closeCategoryList();
    if (selectedCategory === "__new__"){
      showNewCategoryField();
    }else{
      hideNewCategoryField();
      fieldKeywords.focus();
    }
  }

  categoryTrigger.addEventListener("click", () => {
    if (categoryOpen) closeCategoryList(); else openCategoryList();
  });

  categoryTrigger.addEventListener("keydown", (e) => {
    if (!categoryOpen){
      if (e.key === "Enter" || e.key === " " || e.key === "ArrowDown" || e.key === "ArrowUp"){
        e.preventDefault();
        openCategoryList();
      }
      return;
    }
    if (e.key === "ArrowDown"){
      e.preventDefault();
      highlightedIndex = Math.min(highlightedIndex + 1, categoryOptionsData.length - 1);
      applyHighlight();
    }else if (e.key === "ArrowUp"){
      e.preventDefault();
      highlightedIndex = Math.max(highlightedIndex - 1, 0);
      applyHighlight();
    }else if (e.key === "Enter"){
      e.preventDefault();
      selectCategoryOption(highlightedIndex);
    }else if (e.key === "Escape"){
      e.preventDefault();
      e.stopPropagation();
      closeCategoryList();
    }else if (e.key === "Tab"){
      closeCategoryList();
    }
  });

  document.addEventListener("click", (e) => {
    if (categoryOpen && !categorySelectEl.contains(e.target)){
      closeCategoryList();
    }
  });

  function showNewCategoryField(){
    newCategoryField.style.display = "flex";
    newCategoryField.style.flexDirection = "column";
    newCategoryField.classList.remove("field-pop");
    void newCategoryField.offsetWidth;
    newCategoryField.classList.add("field-pop");
    setTimeout(() => fieldCategoryNew.focus(), 60);
  }

  function hideNewCategoryField(){
    newCategoryField.style.display = "none";
    fieldCategoryNew.value = "";
  }

  // ---------- Modal: agregar / editar ----------

  function clearFieldErrors(){
    [fieldName, fieldPrice].forEach(f => f.style.borderColor = "");
  }

  function openAddModal(){
    editingId = null;
    fieldName.value = "";
    fieldKeywords.value = "";
    fieldPrice.value = "";
    clearFieldErrors();
    buildCategoryOptions("");
    hideNewCategoryField();
    deleteBtn.style.display = "none";
    modalOverlay.classList.add("open");
    setTimeout(() => fieldName.focus(), 80);
  }

  function openEditModal(id){
    const p = products.find(x => x.id === id);
    if (!p) return;
    editingId = id;
    fieldName.value = p.name;
    fieldKeywords.value = p.keywords || "";
    fieldPrice.value = p.price;
    clearFieldErrors();
    buildCategoryOptions(p.category || "");
    hideNewCategoryField();
    deleteBtn.style.display = "inline-block";
    modalOverlay.classList.add("open");
    setTimeout(() => fieldName.focus(), 80);
  }

  function closeModal(){
    modalOverlay.classList.remove("open");
    closeCategoryList();
  }

  function handleSave(){
    const name = fieldName.value.trim();
    const keywords = fieldKeywords.value.trim();
    const priceVal = parseFloat(fieldPrice.value);
    const category = selectedCategory === "__new__"
      ? fieldCategoryNew.value.trim()
      : selectedCategory;

    clearFieldErrors();

    if (!name){
      fieldName.style.borderColor = "#666666";
      fieldName.focus();
      return;
    }
    if (!isFinite(priceVal) || priceVal < 0){
      fieldPrice.style.borderColor = "#666666";
      fieldPrice.focus();
      return;
    }

    const data = { name, category, keywords, price: priceVal };

    if (firestoreReady){
      // Con Firestore activo, el listener onSnapshot (ver abajo) se encarga
      // de reflejar el cambio en pantalla y en la copia local en cuanto
      // Firestore confirme el cambio (incluso sin conexión, gracias a su
      // caché propia, esto suele sentirse instantáneo).
      if (editingId){
        productsCollection.doc(editingId).update(data).catch((err) => {
          console.warn("Error al actualizar el producto en Firestore:", err);
        });
      }else{
        productsCollection.add(data).catch((err) => {
          console.warn("Error al agregar el producto en Firestore:", err);
        });
      }
    }else{
      // Sin Firestore configurado: el comportamiento es 100% local, igual que antes.
      if (editingId){
        const p = products.find(x => x.id === editingId);
        if (p){
          p.name = name;
          p.category = category;
          p.keywords = keywords;
          p.price = priceVal;
        }
      }else{
        products.push({ id: genId(), name, category, keywords, price: priceVal });
      }
      saveProducts();
      refreshView();
    }

    closeModal();
  }

  addBtn.addEventListener("click", openAddModal);
  cancelBtn.addEventListener("click", closeModal);
  saveBtn.addEventListener("click", handleSave);

  modalOverlay.addEventListener("click", (e) => {
    if (e.target === modalOverlay) closeModal();
  });

  // ---------- Confirmación de borrado ----------

  function openConfirmDelete(id){
    const p = products.find(x => x.id === id);
    if (!p) return;
    pendingDeleteId = id;
    confirmText.textContent = "¿Eliminar \"" + p.name + "\"?";
    confirmOverlay.classList.add("open");
  }

  function closeConfirmDelete(){
    confirmOverlay.classList.remove("open");
    pendingDeleteId = null;
  }

  function performDelete(){
    if (!pendingDeleteId) return;
    const idToDelete = pendingDeleteId;

    if (firestoreReady){
      productsCollection.doc(idToDelete).delete().catch((err) => {
        console.warn("Error al eliminar el producto en Firestore:", err);
      });
    }else{
      products = products.filter(x => x.id !== idToDelete);
      saveProducts();
      refreshView();
    }

    closeConfirmDelete();
    closeModal();
  }

  deleteBtn.addEventListener("click", () => {
    if (editingId) openConfirmDelete(editingId);
  });

  confirmCancelBtn.addEventListener("click", closeConfirmDelete);
  confirmDeleteBtn.addEventListener("click", performDelete);
  confirmOverlay.addEventListener("click", (e) => {
    if (e.target === confirmOverlay) closeConfirmDelete();
  });

  // ---------- Tecla Escape (prioridad) ----------

  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (confirmOverlay.classList.contains("open")){
      closeConfirmDelete();
      return;
    }
    if (categoryOpen){
      closeCategoryList();
      return;
    }
    if (modalOverlay.classList.contains("open")){
      closeModal();
    }
  });

  // ---------- Enter -> siguiente campo ----------

  function getFieldOrder(){
    const order = [fieldName, categoryTrigger];
    if (selectedCategory === "__new__"){
      order.push(fieldCategoryNew);
    }
    order.push(fieldKeywords, fieldPrice);
    return order;
  }

  function focusNext(current){
    const order = getFieldOrder();
    const idx = order.indexOf(current);
    if (idx === -1) return;
    if (idx === order.length - 1){
      handleSave();
    }else{
      const next = order[idx + 1];
      next.focus();
      if (next.tagName === "INPUT" && typeof next.select === "function") next.select();
    }
  }

  [fieldName, fieldCategoryNew, fieldKeywords, fieldPrice].forEach(f => {
    f.addEventListener("keydown", (e) => {
      if (e.key === "Enter"){
        e.preventDefault();
        focusNext(f);
      }
    });
  });

  // ====================================================================
  // ---------- Firebase / Firestore: sincronización en la nube ----------
  // ====================================================================
  //
  // Idea general:
  // 1) Al entrar, ya se ve algo de inmediato porque `loadProducts()` lee
  //    la última copia guardada en localStorage (búsqueda instantánea).
  // 2) En paralelo, si configuraste tus claves de Firebase, nos conectamos
  //    a Firestore y nos "suscribimos" a la colección con onSnapshot: esto
  //    no es una descarga única, sino que se queda escuchando y avisa cada
  //    vez que algo cambia (incluso si lo cambiaste desde otro dispositivo).
  // 3) Cada vez que llega información nueva de Firestore, se reemplaza la
  //    lista en memoria y se vuelve a guardar en localStorage, así esa
  //    copia local siempre queda al día para la próxima vez que entres
  //    (incluso con mala conexión).
  // 4) Si es la primera vez que conectas Firestore y ya tenías productos
  //    guardados solo de forma local, se suben automáticamente una vez
  //    para no perderlos.
  // 5) Si no configuraste tus claves (o Firebase no carga por alguna
  //    razón), la página sigue funcionando exactamente igual que antes,
  //    100% local.

  function initFirebase(){
    try{
      if (typeof firebase === "undefined"){
        return; // Las librerías de Firebase no cargaron; modo local.
      }
      if (!firebaseConfig || !firebaseConfig.apiKey || firebaseConfig.apiKey === "..."){
        return; // Todavía no se pegaron las claves; modo local.
      }

      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();

      // Permite que la app funcione sin internet: Firestore guarda una
      // copia en IndexedDB y sincroniza solo cuando vuelve la conexión.
      db.enablePersistence({ synchronizeTabs: true }).catch((err) => {
        console.warn("Persistencia offline de Firestore no disponible:", err && err.code);
      });

      productsCollection = db.collection(FIRESTORE_COLLECTION);
      firestoreReady = true;
      subscribeToProducts();
    }catch(e){
      console.warn("No se pudo inicializar Firebase; la app sigue funcionando en modo local.", e);
      firestoreReady = false;
    }
  }

  function subscribeToProducts(){
    if (!productsCollection) return;

    productsCollection.onSnapshot((snapshot) => {
      const remote = [];
      snapshot.forEach((docSnap) => {
        const d = docSnap.data() || {};
        remote.push({
          id: docSnap.id,
          name: d.name || "",
          category: d.category || "",
          keywords: d.keywords || "",
          price: typeof d.price === "number" ? d.price : (parseFloat(d.price) || 0)
        });
      });

      // Migración única: si Firestore está vacío pero ya teníamos productos
      // guardados localmente, los subimos para no perderlos.
      if (!migrationChecked){
        migrationChecked = true;
        if (remote.length === 0 && products.length > 0){
          migrateLocalProductsToFirestore(products);
          return; // este mismo listener se volverá a disparar al terminar
        }
      }

      products = remote;
      saveProducts();
      refreshView();

      // Si el modal de agregar/editar está abierto, refresca el desplegable
      // de categorías por si llegaron categorías nuevas desde otro dispositivo.
      if (modalOverlay.classList.contains("open")){
        buildCategoryOptions(selectedCategory);
      }
    }, (error) => {
      console.warn("No se pudo sincronizar con Firestore; se sigue usando la copia local.", error);
    });
  }

  function migrateLocalProductsToFirestore(localProducts){
    const batch = db.batch();
    localProducts.forEach((p) => {
      const ref = productsCollection.doc();
      batch.set(ref, {
        name: p.name || "",
        category: p.category || "",
        keywords: p.keywords || "",
        price: typeof p.price === "number" ? p.price : (parseFloat(p.price) || 0)
      });
    });
    batch.commit().catch((err) => {
      console.warn("No se pudieron migrar los productos locales a Firestore.", err);
    });
  }

  // ---------- Inicio ----------

  loadProducts();           // copia local: lista para buscar al instante
  updateAddBtnVisibility();
  updateClearButton();
  initFirebase();            // si hay claves configuradas, sincroniza con Firestore

})();
</script>
</body>
